<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verificare Flyere QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
  :root{--bg:#0A0A0F;--surface:#13131A;--border:#252535;--accent:#00F5A0;--accent2:#00B3FF;--warn:#FF4D6D;--text:#E8E8F0;--muted:#6B6B85;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Space Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.5px;}
  .logo span{color:var(--accent);}
  .stats-bar{display:flex;gap:16px;font-size:11px;color:var(--muted);}
  .stat-item strong{color:var(--text);font-size:14px;display:block;}
  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
  .tab{flex:1;padding:14px;text-align:center;font-size:12px;cursor:pointer;border:none;background:none;color:var(--muted);letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;position:relative;}
  .tab.active{color:var(--accent);}
  .tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);}
  .panel{display:none;padding:20px;}
  .panel.active{display:block;}
  .scanner-wrap{position:relative;background:#000;border-radius:16px;overflow:hidden;aspect-ratio:1;max-width:480px;margin:0 auto 20px;border:1px solid var(--border);}
  #video{width:100%;height:100%;object-fit:cover;display:block;}
  .scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .scan-frame{width:65%;aspect-ratio:1;position:relative;}
  .scan-frame::before,.scan-frame::after,.scan-frame .c3,.scan-frame .c4{content:'';position:absolute;width:28px;height:28px;border-color:var(--accent);border-style:solid;}
  .scan-frame::before{top:0;left:0;border-width:3px 0 0 3px;}
  .scan-frame::after{top:0;right:0;border-width:3px 3px 0 0;}
  .scan-frame .c3{bottom:0;left:0;border-width:0 0 3px 3px;}
  .scan-frame .c4{bottom:0;right:0;border-width:0 3px 3px 0;}
  .scan-line{position:absolute;left:5%;right:5%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanAnim 2s ease-in-out infinite;top:0;}
  @keyframes scanAnim{0%{top:5%;opacity:1;}50%{opacity:0.6;}100%{top:95%;opacity:1;}}
  .result-card{border-radius:16px;padding:24px;max-width:480px;margin:0 auto 20px;border:2px solid var(--border);display:none;animation:slideUp 0.3s ease;}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  .result-card.valid{border-color:var(--accent);background:rgba(0,245,160,0.06);}
  .result-card.invalid{border-color:var(--warn);background:rgba(255,77,109,0.06);}
  .result-card.used{border-color:#FF9800;background:rgba(255,152,0,0.06);}
  .result-icon{font-size:40px;text-align:center;margin-bottom:12px;}
  .result-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;text-align:center;margin-bottom:8px;}
  .valid .result-title{color:var(--accent);}
  .invalid .result-title{color:var(--warn);}
  .used .result-title{color:#FF9800;}
  .result-info{font-size:12px;color:var(--muted);text-align:center;line-height:1.8;}
  .result-info strong{color:var(--text);}
  .btn-scan-again{display:block;width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#000;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-top:16px;}
  .start-btn{display:block;width:100%;max-width:480px;margin:0 auto;padding:18px;border-radius:16px;border:2px solid var(--accent);background:transparent;color:var(--accent);font-family:'Space Mono',monospace;font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase;}
  .input-group{max-width:480px;margin:0 auto 20px;}
  .input-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:block;}
  .code-input{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Space Mono',monospace;font-size:16px;outline:none;text-transform:uppercase;}
  .code-input:focus{border-color:var(--accent2);}
  .verify-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent2);color:#000;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-top:12px;}
  .search-input{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Space Mono',monospace;font-size:13px;outline:none;margin-bottom:16px;}
  .search-input:focus{border-color:var(--accent2);}
  .filter-btns{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#000;}
  .code-list{display:grid;gap:8px;}
  .code-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
  .code-item.used{border-left:3px solid #FF9800;}
  .code-item.unused{border-left:3px solid var(--accent);}
  .code-name{font-size:14px;font-weight:700;letter-spacing:1px;}
  .code-meta{font-size:10px;color:var(--muted);margin-top:3px;}
  .badge{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .badge.unused{background:rgba(0,245,160,0.15);color:var(--accent);}
  .badge.used{background:rgba(255,152,0,0.15);color:#FF9800;}
  .camera-hint{text-align:center;padding:20px;color:var(--muted);font-size:12px;line-height:1.8;}
  .progress-bar{background:var(--border);border-radius:4px;height:6px;margin-bottom:20px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width 0.5s ease;}
  #canvas{display:none;}
  .reset-btn{display:block;width:100%;max-width:480px;margin:16px auto 0;padding:12px;border-radius:12px;border:1px solid var(--warn);background:transparent;color:var(--warn);font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:1px;}
</style>
</head>
<body>
<header>
  <div class="logo">QR<span>Scan</span></div>
  <div class="stats-bar">
    <div class="stat-item"><strong id="hdr-total">100</strong>Total</div>
    <div class="stat-item"><strong id="hdr-used">0</strong>Folosite</div>
    <div class="stat-item"><strong id="hdr-unused">100</strong>Disponibile</div>
  </div>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('scanner',this)">📷 Scanner</button>
  <button class="tab" onclick="switchTab('manual',this)">⌨️ Manual</button>
  <button class="tab" onclick="switchTab('list',this)">📋 Listă</button>
</div>
<div id="tab-scanner" class="panel active">
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div class="scanner-wrap" id="scanner-wrap" style="display:none">
    <video id="video" autoplay playsinline muted></video>
    <div class="scan-overlay"><div class="scan-frame"><div class="c3"></div><div class="c4"></div><div class="scan-line"></div></div></div>
  </div>
  <div class="camera-hint" id="camera-hint"><div style="font-size:48px;margin-bottom:12px">📷</div><div>Apasă butonul pentru a porni camera<br>și a scana un cod QR de pe flyer</div></div>
  <div style="max-width:480px;margin:0 auto 20px;">
    <button class="start-btn" id="start-btn" onclick="startCamera()">▶ Pornește Camera</button>
    <button class="start-btn" id="stop-btn" style="display:none;border-color:var(--warn);color:var(--warn);" onclick="stopCamera()">■ Oprește Camera</button>
  </div>
  <div class="result-card" id="result-card">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-info" id="result-info"></div>
    <button class="btn-scan-again" onclick="scanAgain()">Scanează alt cod</button>
  </div>
  <canvas id="canvas"></canvas>
</div>
<div id="tab-manual" class="panel">
  <div class="input-group">
    <label class="input-label">Cod Flyer (ex: FLYER-001)</label>
    <input type="text" class="code-input" id="manual-code" placeholder="FLYER-001" maxlength="20">
    <label class="input-label" style="margin-top:16px">Token de verificare</label>
    <input type="text" class="code-input" id="manual-token" placeholder="DD0EBBCF1B5967F1" maxlength="20">
    <button class="verify-btn" onclick="verifyManual()">Verifică Codul</button>
  </div>
  <div class="result-card" id="manual-result"></div>
</div>
<div id="tab-list" class="panel">
  <input type="text" class="search-input" placeholder="Caută cod... (ex: 042)" oninput="renderList()" id="search-input">
  <div class="filter-btns">
    <button class="filter-btn active" onclick="setFilter('all',this)">Toate (100)</button>
    <button class="filter-btn" onclick="setFilter('unused',this)" id="btn-unused">Disponibile</button>
    <button class="filter-btn" onclick="setFilter('used',this)" id="btn-used">Folosite</button>
  </div>
  <div class="code-list" id="code-list"></div>
  <button class="reset-btn" onclick="resetDB()">⚠ Reset toate codurile (admin)</button>
</div>

let db=[];
let scanning=false,videoStream=null,scanInterval=null,currentFilter='all';
function initDB(){const s=localStorage.getItem(DB_KEY);db=s?JSON.parse(s):JSON.parse(JSON.stringify(INITIAL_DATA));updateStats();}
function saveDB(){localStorage.setItem(DB_KEY,JSON.stringify(db));updateStats();}
function resetDB(){if(confirm('Ești sigur? Toate codurile vor fi resetate la NEUTILIZATE.')){db=JSON.parse(JSON.stringify(INITIAL_DATA));saveDB();renderList();alert('Baza de date a fost resetată!');}}
function updateStats(){const used=db.filter(c=>c.status==='used').length,unused=db.length-used;document.getElementById('hdr-total').textContent=db.length;document.getElementById('hdr-used').textContent=used;document.getElementById('hdr-unused').textContent=unused;document.getElementById('progress').style.width=(used/db.length*100)+'%';document.getElementById('btn-used').textContent='Folosite ('+used+')';document.getElementById('btn-unused').textContent='Disponibile ('+unused+')';}
function switchTab(name,btn){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+name).classList.add('active');btn.classList.add('active');if(name!=='scanner')stopCamera();if(name==='list')renderList();}
async function startCamera(){try{videoStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:1280}}});const v=document.getElementById('video');v.srcObject=videoStream;await v.play();document.getElementById('scanner-wrap').style.display='block';document.getElementById('camera-hint').style.display='none';document.getElementById('start-btn').style.display='none';document.getElementById('stop-btn').style.display='block';document.getElementById('result-card').style.display='none';scanning=true;scanInterval=setInterval(scanFrame,300);}catch(e){alert('Nu s-a putut accesa camera. Verifică permisiunile sau folosește tab-ul Manual.');}}
function stopCamera(){scanning=false;if(scanInterval){clearInterval(scanInterval);scanInterval=null;}if(videoStream){videoStream.getTracks().forEach(t=>t.stop());videoStream=null;}document.getElementById('scanner-wrap').style.display='none';document.getElementById('camera-hint').style.display='block';document.getElementById('start-btn').style.display='block';document.getElementById('stop-btn').style.display='none';}
function scanFrame(){if(!scanning)return;const v=document.getElementById('video'),canvas=document.getElementById('canvas');if(v.readyState!==v.HAVE_ENOUGH_DATA)return;canvas.width=v.videoWidth;canvas.height=v.videoHeight;const ctx=canvas.getContext('2d');ctx.drawImage(v,0,0,canvas.width,canvas.height);const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);const code=jsQR(imgData.data,imgData.width,imgData.height,{inversionAttempts:'dontInvert'});if(code){scanning=false;clearInterval(scanInterval);processQR(code.data);}}
function processQR(raw){try{const data=JSON.parse(raw);const entry=db.find(c=>c.id===data.id&&c.token===data.token&&c.code===data.code);showResult(entry,data.code);}catch(e){showResultMsg('invalid','❌','COD INVALID','Codul QR nu este valid pentru acest sistem.');}}
function showResult(entry,code){stopCamera();const card=document.getElementById('result-card');card.style.display='block';if(!entry){card.className='result-card invalid';document.getElementById('result-icon').textContent='❌';document.getElementById('result-title').textContent='COD INVALID';document.getElementById('result-info').innerHTML='Codul <strong>'+code+'</strong> nu există în baza de date.';return;}if(entry.status==='used'){card.className='result-card used';document.getElementById('result-icon').textContent='⚠️';document.getElementById('result-title').textContent='DEJA FOLOSIT';document.getElementById('result-info').innerHTML='Codul <strong>'+entry.code+'</strong><br>A fost scanat la: <strong>'+entry.scanned_at+'</strong>';return;}entry.status='used';entry.scanned_at=new Date().toLocaleString('ro-RO');saveDB();card.className='result-card valid';document.getElementById('result-icon').textContent='✅';document.getElementById('result-title').textContent='COD VALID!';document.getElementById('result-info').innerHTML='Codul <strong>'+entry.code+'</strong> acceptat!<br>Scanat la: <strong>'+entry.scanned_at+'</strong>';}
function showResultMsg(type,icon,title,info){stopCamera();const card=document.getElementById('result-card');card.style.display='block';card.className='result-card '+type;document.getElementById('result-icon').textContent=icon;document.getElementById('result-title').textContent=title;document.getElementById('result-info').textContent=info;}
function scanAgain(){document.getElementById('result-card').style.display='none';startCamera();}
function verifyManual(){const code=document.getElementById('manual-code').value.trim().toUpperCase();const token=document.getElementById('manual-token').value.trim().toUpperCase();const entry=db.find(c=>c.code===code&&c.token===token);const card=document.getElementById('manual-result');card.style.display='block';if(!entry){card.className='result-card invalid';card.innerHTML='<div class="result-icon">❌</div><div class="result-title">COD INVALID</div><div class="result-info">Combinația cod + token nu a fost găsită.</div>';return;}if(entry.status==='used'){card.className='result-card used';card.innerHTML='<div class="result-icon">⚠️</div><div class="result-title">DEJA FOLOSIT</div><div class="result-info">Codul <strong>'+entry.code+'</strong> scanat la:<br><strong>'+entry.scanned_at+'</strong></div>';return;}entry.status='used';entry.scanned_at=new Date().toLocaleString('ro-RO');saveDB();renderList();card.className='result-card valid';card.innerHTML='<div class="result-icon">✅</div><div class="result-title">COD VALID!</div><div class="result-info">Codul <strong>'+entry.code+'</strong> acceptat!<br>Scanat la: <strong>'+entry.scanned_at+'</strong></div>';}
function renderList(){const search=document.getElementById('search-input').value.toLowerCase();const list=document.getElementById('code-list');const items=db.filter(c=>{const mf=currentFilter==='all'||c.status===currentFilter;const ms=c.code.toLowerCase().includes(search);return mf&&ms;});list.innerHTML=items.map(c=>'<div class="code-item '+c.status+'"><div><div class="code-name">'+c.code+'</div><div class="code-meta">'+(c.status==='used'?'📅 '+c.scanned_at:'🔑 '+c.token)+'</div></div><span class="badge '+c.status+'">'+(c.status==='used'?'Folosit':'Disponibil')+'</span></div>').join('');}
function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderList();}
initDB();renderList();
