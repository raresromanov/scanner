<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verificare Flyere QR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
  :root{--bg:#0A0A0F;--surface:#13131A;--border:#252535;--accent:#00F5A0;--accent2:#00B3FF;--warn:#FF4D6D;--text:#E8E8F0;--muted:#6B6B85;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Space Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
  .logo span{color:var(--accent);}
  .stats-bar{display:flex;gap:16px;font-size:11px;color:var(--muted);}
  .stat-item strong{color:var(--text);font-size:14px;display:block;}
  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
  .tab{flex:1;padding:14px;text-align:center;font-size:12px;cursor:pointer;border:none;background:none;color:var(--muted);letter-spacing:1px;text-transform:uppercase;position:relative;}
  .tab.active{color:var(--accent);}
  .tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);}
  .panel{display:none;padding:20px;}
  .panel.active{display:block;}
  .result-card{border-radius:16px;padding:24px;max-width:480px;margin:0 auto 20px;border:2px solid var(--border);display:none;}
  .result-card.valid{border-color:var(--accent);background:rgba(0,245,160,0.06);}
  .result-card.invalid{border-color:var(--warn);background:rgba(255,77,109,0.06);}
  .result-card.used{border-color:#FF9800;background:rgba(255,152,0,0.06);}
  .result-icon{font-size:40px;text-align:center;margin-bottom:12px;}
  .result-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;text-align:center;margin-bottom:8px;}
  .valid .result-title{color:var(--accent);}
  .invalid .result-title{color:var(--warn);}
  .used .result-title{color:#FF9800;}
  .result-info{font-size:12px;color:var(--muted);text-align:center;line-height:1.8;}
  .result-info strong{color:var(--text);}
  .btn-again{display:block;width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#000;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;margin-top:16px;}
  .input-group{max-width:480px;margin:0 auto 20px;}
  .input-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:block;}
  .code-input{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Space Mono',monospace;font-size:16px;outline:none;text-transform:uppercase;}
  .verify-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent2);color:#000;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px;}
  .search-input{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Space Mono',monospace;font-size:13px;outline:none;margin-bottom:16px;}
  .filter-btns{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#000;}
  .code-list{display:grid;gap:8px;}
  .code-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
  .code-item.used{border-left:3px solid #FF9800;}
  .code-item.unused{border-left:3px solid var(--accent);}
  .code-name{font-size:14px;font-weight:700;letter-spacing:1px;}
  .code-meta{font-size:10px;color:var(--muted);margin-top:3px;}
  .badge{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;}
  .badge.unused{background:rgba(0,245,160,0.15);color:var(--accent);}
  .badge.used{background:rgba(255,152,0,0.15);color:#FF9800;}
  .progress-bar{background:var(--border);border-radius:4px;height:6px;margin-bottom:20px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width 0.5s ease;}
  .reset-btn{display:block;width:100%;max-width:480px;margin:16px auto 0;padding:12px;border-radius:12px;border:1px solid var(--warn);background:transparent;color:var(--warn);font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;}

  /* SCANNER cu input file - metoda nativa iOS */
  .scanner-area{max-width:480px;margin:0 auto 20px;text-align:center;}
  .scan-btn{display:block;width:100%;padding:24px;border-radius:16px;border:2px solid var(--accent);background:transparent;color:var(--accent);font-family:'Space Mono',monospace;font-size:16px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
  .scan-btn:active{background:rgba(0,245,160,0.1);}
  .scan-hint{font-size:11px;color:var(--muted);line-height:1.8;margin-top:8px;}
  #qr-input{display:none;}
</style>
</head>
<body>
<header>
  <div class="logo">QR<span>Scan</span></div>
  <div class="stats-bar">
    <div class="stat-item"><strong id="hdr-total">100</strong>Total</div>
    <div class="stat-item"><strong id="hdr-used">0</strong>Folosite</div>
    <div class="stat-item"><strong id="hdr-unused">100</strong>Disponibile</div>
  </div>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('scanner',this)">📷 Scanner</button>
  <button class="tab" onclick="switchTab('manual',this)">⌨️ Manual</button>
  <button class="tab" onclick="switchTab('list',this)">📋 Listă</button>
</div>

<!-- SCANNER TAB - foloseste camera nativa iOS -->
<div id="tab-scanner" class="panel active">
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div class="scanner-area">
    <div style="font-size:64px;margin-bottom:16px">📷</div>
    <label class="scan-btn" for="qr-input">📸 Scanează QR</label>
    <input type="file" id="qr-input" accept="image/*" capture="environment" onchange="handlePhoto(this)">
    <div class="scan-hint">Apasă butonul — se deschide camera<br>Fotografiază QR-ul de pe flyer<br>Aplicația îl procesează automat</div>
  </div>
  <div class="result-card" id="result-card">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-info" id="result-info"></div>
    <label class="btn-again" for="qr-input">📸 Scanează alt cod</label>
  </div>
  <canvas id="canvas" style="display:none"></canvas>
</div>

<!-- MANUAL TAB -->
<div id="tab-manual" class="panel">
  <div class="input-group">
    <label class="input-label">Cod Flyer (ex: FLYER-001)</label>
    <input type="text" class="code-input" id="manual-code" placeholder="FLYER-001" maxlength="20">
    <label class="input-label" style="margin-top:16px">Token de verificare</label>
    <input type="text" class="code-input" id="manual-token" placeholder="D1A35FBB1309EC4B" maxlength="20">
    <button class="verify-btn" onclick="verifyManual()">Verifică Codul</button>
  </div>
  <div class="result-card" id="manual-result"></div>
</div>

<!-- LIST TAB -->
<div id="tab-list" class="panel">
  <input type="text" class="search-input" placeholder="Caută cod..." oninput="renderList()" id="search-input">
  <div class="filter-btns">
    <button class="filter-btn active" onclick="setFilter('all',this)">Toate (100)</button>
    <button class="filter-btn" onclick="setFilter('unused',this)" id="btn-unused">Disponibile</button>
    <button class="filter-btn" onclick="setFilter('used',this)" id="btn-used">Folosite</button>
  </div>
  <div class="code-list" id="code-list"></div>
  <button class="reset-btn" onclick="resetDB()">⚠ Reset toate codurile</button>
</div>

let db=[],currentFilter='all';

function initDB(){
  localStorage.removeItem('qr_flyer_db');
  const saved=localStorage.getItem(DB_KEY);
  db=saved?JSON.parse(saved):JSON.parse(JSON.stringify(INITIAL_DATA));
  updateStats();
}
function saveDB(){localStorage.setItem(DB_KEY,JSON.stringify(db));updateStats();}
function resetDB(){if(confirm('Reset toate codurile?')){db=JSON.parse(JSON.stringify(INITIAL_DATA));saveDB();renderList();}}
function updateStats(){
  const used=db.filter(c=>c.status==='used').length,unused=db.length-used;
  document.getElementById('hdr-total').textContent=db.length;
  document.getElementById('hdr-used').textContent=used;
  document.getElementById('hdr-unused').textContent=unused;
  document.getElementById('progress').style.width=(used/db.length*100)+'%';
  document.getElementById('btn-used').textContent='Folosite ('+used+')';
  document.getElementById('btn-unused').textContent='Disponibile ('+unused+')';
}
function switchTab(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='list')renderList();
}

function handlePhoto(input){
  if(!input.files||!input.files[0])return;
  const file=input.files[0];
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const canvas=document.getElementById('canvas');
      canvas.width=img.width;
      canvas.height=img.height;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0);
      const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
      const code=jsQR(imageData.data,imageData.width,imageData.height,{inversionAttempts:'attemptBoth'});
      if(code){
        processQR(code.data);
      } else {
        showResultMsg('invalid','❌','Nu s-a citit QR-ul','Încearcă din nou — asigură-te că QR-ul e clar și bine luminat.');
      }
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
  input.value='';
}

function processQR(raw){
  try{
    const data=JSON.parse(raw);
    const entry=db.find(c=>c.id===data.id&&c.token===data.token&&c.code===data.code);
    showResult(entry,data.code);
  }catch(e){
    showResultMsg('invalid','❌','COD INVALID','Codul QR nu este valid pentru acest sistem.');
  }
}

function showResult(entry,code){
  const card=document.getElementById('result-card');
  card.style.display='block';
  if(!entry){
    card.className='result-card invalid';
    document.getElementById('result-icon').textContent='❌';
    document.getElementById('result-title').textContent='COD INVALID';
    document.getElementById('result-info').innerHTML='Codul <strong>'+code+'</strong> nu există în baza de date.';
    return;
  }
  if(entry.status==='used'){
    card.className='result-card used';
    document.getElementById('result-icon').textContent='⚠️';
    document.getElementById('result-title').textContent='DEJA FOLOSIT';
    document.getElementById('result-info').innerHTML='Scanat la: <strong>'+entry.scanned_at+'</strong>';
    return;
  }
  entry.status='used';entry.scanned_at=new Date().toLocaleString('ro-RO');saveDB();
  card.className='result-card valid';
  document.getElementById('result-icon').textContent='✅';
  document.getElementById('result-title').textContent='COD VALID!';
  document.getElementById('result-info').innerHTML='Codul <strong>'+entry.code+'</strong> acceptat!<br>'+entry.scanned_at;
}

function showResultMsg(type,icon,title,info){
  const card=document.getElementById('result-card');
  card.style.display='block';
  card.className='result-card '+type;
  document.getElementById('result-icon').textContent=icon;
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-info').textContent=info;
}

function verifyManual(){
  const code=document.getElementById('manual-code').value.trim().toUpperCase();
  const token=document.getElementById('manual-token').value.trim().toUpperCase();
  const entry=db.find(c=>c.code===code&&c.token===token);
  const card=document.getElementById('manual-result');
  card.style.display='block';
  if(!entry){card.className='result-card invalid';card.innerHTML='<div class="result-icon">❌</div><div class="result-title">COD INVALID</div><div class="result-info">Cod sau token incorect.</div>';return;}
  if(entry.status==='used'){card.className='result-card used';card.innerHTML='<div class="result-icon">⚠️</div><div class="result-title">DEJA FOLOSIT</div><div class="result-info">Scanat la: <strong>'+entry.scanned_at+'</strong></div>';return;}
  entry.status='used';entry.scanned_at=new Date().toLocaleString('ro-RO');saveDB();renderList();
  card.className='result-card valid';card.innerHTML='<div class="result-icon">✅</div><div class="result-title">COD VALID!</div><div class="result-info">Codul <strong>'+entry.code+'</strong> acceptat!<br>'+entry.scanned_at+'</div>';
}

function renderList(){
  const search=document.getElementById('search-input').value.toLowerCase();
  const list=document.getElementById('code-list');
  const items=db.filter(c=>(currentFilter==='all'||c.status===currentFilter)&&c.code.toLowerCase().includes(search));
  list.innerHTML=items.map(c=>'<div class="code-item '+c.status+'"><div><div class="code-name">'+c.code+'</div><div class="code-meta">'+(c.status==='used'?'📅 '+c.scanned_at:'🔑 '+c.token)+'</div></div><span class="badge '+c.status+'">'+(c.status==='used'?'Folosit':'Disponibil')+'</span></div>').join('');
}
function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderList();}
initDB();renderList();
